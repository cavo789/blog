# cspell:ignore erikvl87,langtool,ngrams

services:
  docusaurus:
    build:
      context: ..
      dockerfile: Dockerfile
      target: devcontainer
      args:
        - APP_HOME=${APP_HOME:-/opt/docusaurus}
        - OS_USERID=${OS_USERID:-1000}
        - OS_GROUPID=${OS_GROUPID:-1000}
    user: node
    env_file:
      - ../.env
    volumes:
      - ..:${APP_HOME:-/opt/docusaurus}
      - node_modules:/opt/docusaurus/node_modules
      - vscode-server:/home/node/.vscode-server
      - vscode-extensions:/home/node/.vscode-server/extensions
      - yarn-cache:/home/node/.cache/yarn/v6
    ports:
      - "3000:3000"
    depends_on:
      languagetool:
        condition: service_healthy

  languagetool:
    image: erikvl87/languagetool
    restart: unless-stopped
    environment:
      - langtool_languageModel=/ngrams
      - Java_Xms=512m
      - Java_Xmx=1g
    volumes:
      - ngrams:/ngrams
    ports:
      - "8010:8010"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/v2/languages"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  ngrams:
  node_modules:
  vscode-server:
  vscode-extensions:
  yarn-cache:
