# -----------------------------------------------------------------------------
# AI Code Reviewer - Global Configuration
# -----------------------------------------------------------------------------

# --- Ollama Engine Settings ---
# Configures the connection to your local Large Language Model server.
ollama:
  # Specifies the Ollama model to use for the review.
  # To see available models, run: curl http://<your_ollama_url>/api/tags | jq
  model: "qwen2.5-coder:14b" # deepseek-r1:32b | qwen2.5-coder:32b | qwen2.5-coder:14b

  # The base URL for the Ollama API server.
  # This must be reachable from where the script is executed (e.g., your Docker container).
  url: "http://192.168.0.218:11434"

# --- Script Runtime Settings ---
# Controls the execution behavior of the code reviewer.
runtime:
  # Maximum time in seconds to wait for a response from the AI.
  # Increase this for larger files or slower models.
  timeout: 180

  # Enables caching of AI responses. When true, re-analyzing an identical file
  # with identical rules will use a local cache instead of calling the LLM,
  # saving time and resources.
  cache_enabled: true

  # --- Console Output Verbosity ---
  # Controls how much information is displayed during a review.
  verbosity:
    # If true, displays the model and URL being used at startup.
    show_config: true

    # Controls how much of the system prompt (the AI's instructions) is printed.
    # Levels:
    #   "none": No prompt information is shown.
    #   "name": (Default) Only shows a header like [PROMPT CONTEXT: filename].
    #   "full": Shows the header and the complete prompt content sent to the AI.
    show_system_instructions: full

    # If true, prints the full refactored code block suggested by the AI when a
    # file is rejected.
    show_full_source: false

    # If true, displays a colored 'diff' view comparing the original code
    # to the AI's suggested refactoring.
    show_diff: true

# -----------------------------------------------------------------------------
# Git Staging Analyzer Rules
#
# IMPORTANT: These filters apply ONLY when the script is run automatically as a
# pre-commit hook (without arguments). They determine which files from the
# staging area are sent to the AI.
#
# When you manually specify a file as a command-line argument,
# e.g., `... src/main.py`, these filters are BYPASSED and the specified
# file is ALWAYS analyzed.
# -----------------------------------------------------------------------------
git_staging_analyzer:
  # List of file extensions that should trigger an AI review.
  # Files with other extensions in the staging area will be ignored.
  supported_extensions:
    - ".bash"
    - ".js"
    - ".json"
    - ".md"
    - ".php"
    - ".py"
    - ".qmd"
    - ".sh"
    - ".yaml"
    - ".yml"

  # A list of specific filenames or patterns to always include in the review,
  # regardless of their extension (or lack thereof).
  # The check is case-insensitive.
  special_filenames:
    - "dockerfile"
    - "compose"