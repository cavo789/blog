[files]
extend-exclude = [
  ".docusaurus/",
  ".todos/",
  ".unpublished/",
  "*.lock",
  "api",
  "build/",
  "node_modules/",
  "static/"
]

[default]
extend-ignore-re = [
  # 1. Ignore SSH key fingerprints (e.g., SHA256:...)
  "SHA256:[A-Za-z0-9+/]+={0,2}",

  # 2. Ignore full SSH public keys (e.g., ssh-ed25519 AAA...)
  "ssh-(rsa|ed25519|dss)\\s+[A-Za-z0-9+/]+={0,2}",

  # 3. Ignore Docker IDs (12–64-character hexadecimal strings)
  "\\b[a-f0-9]{12,64}\\b",

  # 4. Enable inline exclusion comments for Markdown
  "(?s).*?",
  ".*$"
]

[default.extend-words]
# VBA/Access built-in function (not a typo of "If")
Iif = "Iif"
# Oracle HR sample schema constraint abbreviation (external sample code)
countr = "countr"
# French preposition in a French literary quote (about.mdx)
sur = "sur"
# Latin word appearing in Quarto lorem ipsum placeholder text
optio = "optio"
# Hex fragment inside Docker container IDs (e.g. "5abd45eecfa3")
abd = "abd"
# Vietnamese proper noun (author name "Son Tung PHAM")
tung = "tung"
